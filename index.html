<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Кнопка Скачать</title>
        <style>
            .download-button {
                display: inline-block;
                padding: 10px 20px;
                font-size: 16px;
                color: white;
                background-color: blue;
                text-decoration: none;
                border-radius: 5px;
                transition: background-color 0.3s;
            }

            .download-button:hover {
                background-color: darkblue;
            }
        </style>
    </head>
    <body>
        <a href="pp.zip" class="download-button" download="pp.zip"
            >Скачать файл</a
        >
    </body>
</html>
